# ─────────────────────────────────────────────────────────────────────────────
# .github/workflows/deploy-dev.yml
#
# GitHub Actions workflow: Build SolarHub dev branch and deploy to GitHub Pages.
#
# Trigger:  Every push to the `dev` branch.
# Job 1 – build:  Install dependencies, run `npm run build` with VITE_ENV=dev,
#                 upload the resulting `dist/` folder as a Pages artifact.
# Job 2 – deploy: Download the artifact and push it to GitHub Pages with
#                 the dev-pages environment.
#
# This deploys to the dev subdirectory: https://<org>.github.io/solarhub/dev/
# ────────────────────────────────────────────────────────────────────────────

name: Deploy Dev to GitHub Pages

on:
  # Run on every push to the dev branch
  push:
    branches:
      - dev

  # Allow manual trigger from the Actions tab
  workflow_dispatch:

# Sets the GITHUB_TOKEN permissions needed by the deploy action
permissions:
  contents: read      # read the repository source
  pages: write        # write to GitHub Pages
  id-token: write     # required for OIDC token used by deploy-pages

# Only allow one concurrent deployment; cancel any in-progress run when a new
# push arrives so we never deploy stale code.
concurrency:
  group: pages-dev
  cancel-in-progress: true

jobs:
  # ── Job 1: build ────────────────────────────────────────────────────────────
  build:
    name: Build (Dev)
    runs-on: ubuntu-latest

    steps:
      # 1. Check out the repository at the commit that triggered the workflow
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up the Node.js version that matches the project requirements.
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 3. Install all dependencies
      - name: Install dependencies
        run: npm ci

      # 4. Configure GitHub Pages
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      # 5. Build the production bundle with VITE_ENV=dev
      #    This sets the base path to /solarhub/dev/ in vite.config.ts
      - name: Build with Vite (Dev)
        run: npm run build
        env:
          VITE_ENV: dev

      # 6. Upload the `dist/` folder as a Pages artifact
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  # ── Job 2: deploy ───────────────────────────────────────────────────────────
  deploy:
    name: Deploy (Dev)
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages-dev
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      # Deploy the artifact to GitHub Pages
      - name: Deploy to GitHub Pages (Dev)
        id: deploy
        uses: actions/deploy-pages@v4

name: Build Android APK

on:
  push:
    branches:
      - app
  pull_request:
    branches:
      - app
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-apk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ github.workspace }}/app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: ${{ github.workspace }}/app/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install app dependencies
        run: npm install

      - name: Generate Android project from Expo config
        run: npx expo prebuild --platform android --non-interactive

      - name: Build release APK
        run: |
          cd android
          ./gradlew assembleRelease

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: solarhub-android-apk
          path: ${{ github.workspace }}/app/android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error
